<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Changer App</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
            color: white;
            font-family: sans-serif;
        }
        #ad-container {
            height: 15%; /* 15% màn hình cho quảng cáo */
            width: 100%;
            background-color: #1e1e1e;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #333;
        }
        #ad-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
        #app-container {
            height: 85%; /* 85% màn hình cho app chính */
            width: 100%;
        }
        #app-frame {
            width: 100%;
            height: 100%;
            border: none;
            background-color: white; /* Gradio background */
        }
    </style>
</head>
<body>

    <!-- KHU VỰC HIỂN THỊ QUẢNG CÁO -->
    <div id="ad-container">
        <!-- Thay thế src bằng đường link chứa Banner Quảng Cáo của bạn -->
        <!-- Ví dụ: https://your-website.com/ads.html -->
        <iframe id="ad-frame" src="about:blank" onload="loadAd()"></iframe>
    </div>

    <!-- KHU VỰC ỨNG DỤNG RVC -->
    <div id="app-container">
        <iframe id="app-frame" src="http://127.0.0.1:7897/"></iframe>
    </div>

    <script>
        function loadAd() {
            // Hiển thị tạm thời nội dung quảng cáo demo
            const frame = document.getElementById("ad-frame");
            if (frame.src === "about:blank" || frame.src.endsWith("about:blank")) {
                const doc = frame.contentWindow.document;
                doc.open();
                doc.write(`
                    <div style="display:flex; justify-content:center; align-items:center; height:100vh; background-color:#2c3e50; color:white; font-family:Arial; margin:0;">
                        <h2>NƠI HIỂN THỊ QUẢNG CÁO (BANNER)</h2>
                    </div>
                `);
                doc.close();
            }
        }
    </script>
</body>
</html>
